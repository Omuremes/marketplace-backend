name: Backend CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: marketplace_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install poetry
        poetry config virtualenvs.create false
        poetry install --with dev
        
    - name: Setup environment
      run: |
        cp .env.example .env
        {
          echo "POSTGRES_USER=postgres"
          echo "POSTGRES_PASSWORD=password"
          echo "POSTGRES_SERVER=localhost"
          echo "POSTGRES_PORT=5432"
          echo "POSTGRES_DB=marketplace_test"
        } >> .env

    - name: Start MinIO
      run: |
        docker run -d --name minio \
          -p 9000:9000 \
          -e MINIO_ROOT_USER=minioadmin \
          -e MINIO_ROOT_PASSWORD=minioadmin \
          minio/minio:latest server /data --console-address ":9001"

    - name: Wait for MinIO
      run: |
        for i in {1..30}; do
          curl -fsS http://localhost:9000/minio/health/live && exit 0
          sleep 2
        done
        echo "MinIO did not become healthy in time" >&2
        exit 1
        
    - name: Lint with ruff
      continue-on-error: true
      run: poetry run ruff check app tests || true

    - name: Run migrations
      run: poetry run alembic upgrade head
      
    - name: Run Pytest
      run: poetry run pytest
